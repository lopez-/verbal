<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1 class="site-title">
                    <a href="{{ '/' | relative_url }}">Verbal</a>
                </h1>
                <p class="tagline">Tu dosis diaria de léxico</p>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="{{ '/' | relative_url }}">Inicio</a></li>
                    <li><a href="{{ '/es/Legal/PrivacyPolicy.html' | relative_url }}">Política de Privacidad</a></li>
                    <li><a href="{{ '/es/Legal/TermsOfUse.html' | relative_url }}">Términos de Uso</a></li>
                    <li><a href="{{ '/es/support.html' | relative_url }}">Soporte</a></li>
                </ul>
            </nav>
        </header>

        <main class="content-page">
            {{ content }}
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; {{ 'now' | date: "%Y" }} ShrugStudios. Todos los derechos reservados.</p>
                <p class="location">Montreal, Canadá</p>
            </div>
        </footer>
    </div>
</body>
</html>
